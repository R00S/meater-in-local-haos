name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'versionName' android/app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Copy panel JS to Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp custom_components/kitchen_cooking_engine/www/kitchen-cooking-panel.js android/app/src/main/assets/kitchen-cooking-panel.js
          # Rewrite the CDN LitElement import to the bundled local asset so the panel
          # works inside the APK WebView with no network access (mirrors the rewrite
          # in custom_components/kitchen_cooking_engine/generate_frontend_data.py).
          # Without this rewrite the import fails, kitchen-cooking-card is never
          # defined and the WebView shows only the native back button (black screen).
          sed -i 's|"https://unpkg.com/lit-element@2.4.0/lit-element.js?module"|"./lit-element-bundle.js"|g' android/app/src/main/assets/kitchen-cooking-panel.js
          # Fail loudly if the rewrite did not happen — the panel would silently
          # fall back to a black screen otherwise.
          if grep -q 'unpkg.com/lit-element' android/app/src/main/assets/kitchen-cooking-panel.js; then
            echo "::error::CDN lit-element import was not rewritten to ./lit-element-bundle.js"
            exit 1
          fi

      - name: Copy recipe files to Android assets
        run: |
          mkdir -p android/app/src/main/assets/recipes
          cp -r custom_components/kitchen_cooking_engine/www/recipes/. android/app/src/main/assets/recipes/

      - name: Build APK
        working-directory: android
        env:
          GIT_BRANCH: ${{ github.ref_name }}
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Copy APK with version in filename and update latest
        run: |
          mkdir -p android/apk
          cp android/app/build/outputs/apk/debug/app-debug.apk android/apk/meater-kitchen-${{ steps.version.outputs.name }}.apk
          cp android/apk/meater-kitchen-${{ steps.version.outputs.name }}.apk android/apk/meater-kitchen-latest.apk

      - name: Update README download link for this branch
        run: |
          BRANCH="${{ github.ref_name }}"
          sed -i "s|raw/[^/]*/android/apk/meater-kitchen-latest\.apk|raw/${BRANCH}/android/apk/meater-kitchen-latest.apk|g" README.md

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/apk/ README.md
          git commit -m "build: APK v${{ steps.version.outputs.name }}"
          git push
