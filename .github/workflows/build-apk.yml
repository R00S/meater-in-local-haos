name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'versionName' android/app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "name=$VERSION" >> $GITHUB_OUTPUT

      - name: Build APK
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Copy APK with version in filename and update symlink
        run: |
          mkdir -p android/apk
          cp android/app/build/outputs/apk/debug/app-debug.apk android/apk/meater-kitchen-${{ steps.version.outputs.name }}.apk
          cd android/apk
          ln -sf meater-kitchen-${{ steps.version.outputs.name }}.apk meater-kitchen-latest.apk

      - name: Commit APK to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/apk/
          git commit -m "build: APK v${{ steps.version.outputs.name }}"
          git push
