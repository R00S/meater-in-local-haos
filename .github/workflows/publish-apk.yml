name: Publish APK

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}

      # ── Decode keystore from GitHub secret (optional) ────────────────────
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/meater-release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── Build release APK (signed if keystore is available) ──────────────
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && 'app/meater-release.keystore' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease

      # ── Build debug APK as well (always available without signing) ───────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon :app:assembleDebug

      # ── Attach both APKs to the release ──────────────────────────────────
      - name: Upload release APK
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: android/app/build/outputs/apk/release/app-release*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug APK
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'release'
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload artifacts for workflow_dispatch runs ───────────────────────
      - name: Upload APK artifacts (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: meater-kitchen-apks
          path: |
            android/app/build/outputs/apk/release/app-release*.apk
            android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
