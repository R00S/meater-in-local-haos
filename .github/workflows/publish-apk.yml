name: Publish APK

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to attach the APK to (e.g. v0.10.0.0). Must already exist.'
        required: true
        type: string

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate KCE cooking data assets for Android
        run: |
          cd custom_components/kitchen_cooking_engine
          python3 generate_frontend_data.py

      - name: Copy generated assets into Android project
        run: |
          mkdir -p android/app/src/main/assets
          cp custom_components/kitchen_cooking_engine/www/kitchen-cooking-panel.js \
             android/app/src/main/assets/kitchen-cooking-panel.js

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_SIGNING_KEY }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
          fail_on_unmatched_files: true
